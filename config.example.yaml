# Safe example config. Do not put real tokens or OAuth credentials here.
app:
  host: "127.0.0.1"
  port: 8000

paths:
  home: "~/.morning-dispatch"
  data_dir: "~/.morning-dispatch/data"
  secrets_dir: "~/.morning-dispatch/secrets"
  database_path: "~/.morning-dispatch/data/db/morning_dispatch.sqlite3"
  gmail_client_secret_path: "~/.morning-dispatch/secrets/gmail/gmail_client_secret.json"
  gmail_credentials_path: "~/.morning-dispatch/secrets/gmail/gmail_credentials.json"

network:
  public_base_url: "http://127.0.0.1:8000"
  # For Tailscale use, set this to your MagicDNS hostname in runtime/local.env (gitignored).
  # tailscale_example: "https://your-machine.ts.net:8000"

defaults:
  profile_name: "Default"
  digest_threshold: 0.45
