services:
  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      MORNING_DISPATCH_DATA_DIR: /data
      MORNING_DISPATCH_SECRETS_DIR: /secrets
      MORNING_DISPATCH_DB_PATH: /data/db/morning_dispatch.sqlite3
    volumes:
      - ${MORNING_DISPATCH_DATA_DIR}:/data
      - ${MORNING_DISPATCH_SECRETS_DIR}:/secrets:ro
    networks: [dispatch-internal]

networks:
  dispatch-internal:
    internal: true
